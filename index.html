<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>ポケスリトラッカー</title>
  <meta name="application-name" content="ポケスリトラッカー">
  <meta name="apple-mobile-web-app-title" content="ポケスリトラッカー">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#177e89">
  <link rel="icon" href="./icon.jfif" type="image/jpeg">
  <link rel="apple-touch-icon" href="./icon.jfif">
  <link rel="manifest" href="./manifest.webmanifest">
  <style>
    :root{color-scheme:light;--bg:#f7f4ec;--panel:#fffdf8;--sub:#eef7f4;--text:#272722;--muted:#756f64;--line:#ddd7ca;--brand:#177e89;--warn:#df9634;--danger:#d94f45;--current:#fff3c4;--shadow:0 10px 24px #2e2a201f;--r:8px}
    [data-theme=dark]{color-scheme:dark;--bg:#17191b;--panel:#23272b;--sub:#1d3233;--text:#f4f1e8;--muted:#bbb4a7;--line:#3b4044;--brand:#4fb3bf;--warn:#f0a83b;--danger:#ff746d;--current:#3c3420;--shadow:0 10px 24px #0006}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;line-height:1.45}button,input,select,textarea{font:inherit;color:inherit}button{min-height:42px;border:1px solid var(--line);border-radius:var(--r);background:var(--panel);padding:8px 12px}button.primary{background:var(--brand);border-color:var(--brand);color:#fff;font-weight:700}button.active{border-color:var(--brand);box-shadow:inset 0 0 0 1px var(--brand)}button.icon{width:42px;padding:0;font-size:20px;font-weight:800}button.danger{color:var(--danger)}input,select,textarea{width:100%;min-height:42px;border:1px solid var(--line);border-radius:var(--r);background:var(--panel);padding:9px 10px}textarea{min-height:74px;resize:vertical}label{display:grid;gap:5px;color:var(--muted);font-size:12px;font-weight:700}.app{max-width:720px;margin:auto;min-height:100dvh;padding-bottom:82px}header{position:sticky;top:0;z-index:4;padding:max(12px,env(safe-area-inset-top)) 14px 10px;background:color-mix(in srgb,var(--bg) 92%,transparent);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}main{padding:12px}h1{margin:0;font-size:18px}h2{margin:12px 0 10px;font-size:17px}h3{margin:12px 0 8px;font-size:15px}.top,.between{display:flex;align-items:center;justify-content:space-between;gap:10px}.row{display:flex;align-items:center;gap:8px}.wrap{flex-wrap:wrap}.grid{display:grid;gap:10px}.two{grid-template-columns:1fr 1fr}.screen{display:none}.screen.active{display:block}.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:12px;margin-bottom:12px}.muted{color:var(--muted)}.small{font-size:12px}.count{font-weight:800;font-variant-numeric:tabular-nums}.pill{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);background:var(--sub);border-radius:999px;padding:5px 9px;font-size:12px;white-space:nowrap;max-width:100%}.event-normal{--event:#78a55a}.event-special{--event:#d68b28}.event-legend{--event:#6b72d6}.dot{width:12px;height:12px;border-radius:50%;background:var(--event,var(--brand));flex:none}.current-event{background:var(--current);border-color:var(--warn);box-shadow:inset 0 0 0 1px var(--warn)}.tabs{display:grid;grid-template-columns:repeat(5,1fr);position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(720px,100%);padding:8px 8px max(8px,env(safe-area-inset-bottom));background:color-mix(in srgb,var(--panel) 94%,transparent);border-top:1px solid var(--line);backdrop-filter:blur(16px);z-index:5}.tabs button{min-height:48px;padding:4px;font-size:11px;border-color:transparent;background:transparent}.tabs button.active{background:var(--sub);border-color:var(--line);box-shadow:none}.days{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:10px 0}.days button{min-height:48px;padding:5px 2px;font-size:12px}.research-tabs,.seg3{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}.seg3{grid-template-columns:repeat(3,1fr)}.types{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.types button{padding:6px 4px;font-size:12px}.suggest,.choices{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;max-height:128px;overflow:auto}.poke-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;border-top:1px solid var(--line);padding-top:10px;margin-top:10px}.controls{display:flex;align-items:center;gap:6px}.chart{display:grid;grid-template-columns:88px 1fr 58px;gap:8px;align-items:center;margin:7px 0}.bar{height:12px;border-radius:999px;background:var(--line);overflow:hidden}.bar span{display:block;height:100%;background:var(--brand)}.detail{border-top:1px solid var(--line);margin-top:10px;padding-top:10px}#multiEventChoices .pill{width:100%;white-space:normal;justify-content:flex-start;overflow-wrap:anywhere;text-align:left}#multiEventChoices input{width:auto;min-height:auto;flex:none}.hidden{display:none!important}.file{display:none}dialog{border:0;background:transparent;padding:0;width:min(92vw,520px)}dialog::backdrop{background:#0008}@media(max-width:420px){.two{grid-template-columns:1fr}.types{grid-template-columns:repeat(2,1fr)}.chart{grid-template-columns:74px 1fr 48px}.poke-row{grid-template-columns:1fr}.controls{justify-content:flex-end}}
  </style>
</head>
<body>
  <div class="app">
    <header><div class="top"><div><h1>ポケスリトラッカー</h1><div class="small muted" id="currentLabel">イベント未設定</div></div><button id="themeToggle" class="icon" title="ダークモード">◐</button></div></header>
    <main>
      <section id="screen-log" class="screen active">
        <div class="card grid"><div class="between"><h2>今週のイベント</h2><button class="primary" id="newEventBtn">＋作成</button></div><div class="row"><span id="currentKindDot" class="dot"></span><label style="flex:1">現在のイベント<select id="currentEventSelect"></select></label></div></div>
        <div id="noEvent" class="card"><p>まずイベントを作成してください。</p></div>
        <div id="logArea" class="hidden"><div class="card"><div class="days" id="dayStrip"></div><label>日ごとの備考<textarea id="dayNote" placeholder="料理、寝顔、気づいたことなど"></textarea></label></div><div class="card"><div class="research-tabs"><button id="research1" class="active">1回目リサーチ</button><button id="research2">2回目リサーチ</button></div><h3>睡眠タイプ</h3><div class="types" id="sleepTypeButtons"></div></div><div class="card"><h3>ポケモン入力</h3><div class="row"><input id="pokemonInput" placeholder="名前を入力" autocomplete="off"><button class="primary" id="addPokemonBtn">追加</button></div><div class="suggest" id="suggestions"></div><div class="seg3" id="pokemonChoiceTabs"><button data-tab="favorites" class="active">お気に入り</button><button data-tab="event">今回</button><button data-tab="all">全体</button></div><div class="choices" id="choiceList"></div><div id="pokemonList"></div></div></div>
      </section>
      <section id="screen-stats" class="screen"><div class="card"><h2>週間集計</h2><div id="weeklyStats"></div></div><div class="card"><h2>複数イベント集計</h2><div class="grid"><label>フィールド一括選択<select id="bulkFieldSelect"></select></label><div class="row"><button id="selectFieldBtn">フィールド選択</button><button id="clearMultiBtn">解除</button></div><label>イベント種類一括選択<select id="bulkKindSelect"><option value="normal">通常週</option><option value="special">イベント週</option><option value="legend">伝説イベント週</option></select></label><div class="row"><button id="selectKindBtn">種類選択</button></div><div id="multiEventChoices" class="grid"></div><div id="multiStats"></div></div></div><div class="card"><h2>全イベント合計</h2><div id="allStats"></div></div></section>
      <section id="screen-dex" class="screen"><div class="card"><h2>ポケモン図鑑</h2><input id="dexSearch" placeholder="ポケモン検索"></div><div id="dexList"></div></section>
      <section id="screen-events" class="screen"><div class="card between"><h2>過去イベント</h2><button class="primary" id="newEventBtn2">＋作成</button></div><div id="eventList"></div></section>
      <section id="screen-backup" class="screen"><div class="card grid"><h2>バックアップ</h2><button class="primary" id="exportBtn">バックアップを書き出し</button><button id="importBtn">バックアップを読み込み</button><input id="importFile" class="file" type="file" accept="application/json"><p class="small muted">端末内に自動保存されます。機種変更や予備保存にはバックアップを書き出してください。</p></div></section>
    </main>
    <nav class="tabs"><button data-screen="log" class="active">記録</button><button data-screen="stats">集計</button><button data-screen="dex">図鑑</button><button data-screen="events">一覧</button><button data-screen="backup">保存</button></nav>
  </div>
  <dialog id="eventDialog"><form class="card grid" id="eventForm"><h2 id="dialogTitle">イベント作成</h2><input type="hidden" id="eventId"><label>イベント名<input id="eventName" required></label><div class="grid two"><label>開始日<input id="eventDate" type="date" required></label><label>行く島<select id="eventIsland"></select></label></div><label>種類<select id="eventKind"><option value="normal">通常週</option><option value="special">イベント週</option><option value="legend">伝説イベント週</option></select></label><label>備考<textarea id="eventNote"></textarea></label><div class="row"><button class="primary" type="submit">保存</button><button type="button" id="closeEventDialog">閉じる</button></div></form></dialog>
  <script>
    const islands=['ワカクサ本島','シアンの砂浜','トープ洞窟','ウノハナ雪原','ラピスラズリ湖畔','ゴールド旧発電所','アンバー渓谷','ワカクサ本島EX'];
    const sleepTypes=['うとうと','すやすや','ぐっすり','とくちょうなし'];
    const coreSleepTypes=['うとうと','すやすや','ぐっすり'];
    const kindLabels={normal:'通常週',special:'イベント週',legend:'伝説イベント週'};
    const kindClass={normal:'event-normal',special:'event-special',legend:'event-legend'};
    const storeKey='pokemonSleepResearchLog.v1';
    let state=loadState(),activeDay=0,activeResearch=0,choiceTab='favorites',selectedMulti=new Set(),openDexName='';
    function blankResearch(){return{sleepType:'とくちょうなし',pokemon:[]}}
    function blankDay(date){return{date,note:'',researches:[blankResearch(),blankResearch()]}}
    function mondayOf(date){let d=new Date(date+'T00:00:00'),day=d.getDay();d.setDate(d.getDate()-((day+6)%7));return d.toISOString().slice(0,10)}
    function makeEvent(v){let start=mondayOf(v.date),days=[];for(let i=0;i<7;i++){let d=new Date(start+'T00:00:00');d.setDate(d.getDate()+i);days.push(blankDay(d.toISOString().slice(0,10)))}return{id:crypto.randomUUID(),name:v.name,date:start,island:v.island,kind:v.kind,note:v.note,days}}
    function loadState(){let fallback={events:[],currentEventId:'',favorites:[],pokemonTypes:{},theme:'light'};try{return Object.assign(fallback,JSON.parse(localStorage.getItem(storeKey)||'{}'))}catch(e){return fallback}}
    function migrate(){state.pokemonTypes=state.pokemonTypes||{};state.events.forEach(e=>e.days.forEach(d=>d.researches.forEach(r=>r.pokemon.forEach(p=>{if(!state.pokemonTypes[p.name]&&p.sleepType)state.pokemonTypes[p.name]=p.sleepType;if(!p.sleepType)p.sleepType=state.pokemonTypes[p.name]||'うとうと'}))))}
    function save(){localStorage.setItem(storeKey,JSON.stringify(state))}
    function curEvent(){return state.events.find(e=>e.id===state.currentEventId)||state.events[0]}
    function curResearch(){let e=curEvent();return e&&e.days[activeDay].researches[activeResearch]}
    function esc(v){return String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
    function kana(v){return String(v).replace(/[ぁ-ん]/g,ch=>String.fromCharCode(ch.charCodeAt(0)+96)).toLowerCase()}
    function matchesName(name,q){let a=kana(name),b=kana(q.trim());return b&&a.includes(b)}
    function allNames(){return [...new Set(state.events.flatMap(e=>e.days.flatMap(d=>d.researches.flatMap(r=>r.pokemon.map(p=>p.name)))))].sort((a,b)=>a.localeCompare(b,'ja'))}
    function eventNames(e=curEvent()){return e?[...new Set(e.days.flatMap(d=>d.researches.flatMap(r=>r.pokemon.map(p=>p.name))))].sort((a,b)=>a.localeCompare(b,'ja')):[]}
    function setPokemonType(name,type){state.pokemonTypes[name]=type;state.events.forEach(e=>e.days.forEach(d=>d.researches.forEach(r=>r.pokemon.forEach(p=>{if(p.name===name)p.sleepType=type}))))}
    function render(){migrate();document.documentElement.dataset.theme=state.theme;renderSelects();renderLog();renderStats();renderDex();renderEvents();save()}
    function renderSelects(){currentEventSelect.innerHTML=state.events.map(e=>'<option value="'+e.id+'">'+esc(e.name)+' / '+esc(e.island)+'</option>').join('');currentEventSelect.value=state.currentEventId||'';let e=curEvent();currentLabel.textContent=e?e.name+' - '+e.island:'イベント未設定';currentKindDot.className='dot '+(e?kindClass[e.kind]:'');eventIsland.innerHTML=islands.map(i=>'<option>'+i+'</option>').join('');bulkFieldSelect.innerHTML=islands.map(i=>'<option>'+i+'</option>').join('')}
    function renderLog(){let e=curEvent();noEvent.classList.toggle('hidden',!!e);logArea.classList.toggle('hidden',!e);if(!e)return;activeDay=Math.min(activeDay,6);let day=e.days[activeDay];dayStrip.innerHTML=e.days.map((d,i)=>{let lab=new Date(d.date+'T00:00:00').toLocaleDateString('ja-JP',{weekday:'short',day:'numeric'});return '<button class="'+(i===activeDay?'active':'')+'" data-day="'+i+'">'+lab+'</button>'}).join('');dayNote.value=day.note||'';research1.classList.toggle('active',activeResearch===0);research2.classList.toggle('active',activeResearch===1);let r=curResearch();sleepTypeButtons.innerHTML=sleepTypes.map(t=>'<button data-sleep-type="'+t+'" class="'+(r.sleepType===t?'active':'')+'">'+t+'</button>').join('');renderChoices();renderPokes()}
    function renderChoices(){let names=choiceTab==='favorites'?state.favorites:choiceTab==='event'?eventNames():choiceTab==='all'?allNames():[];document.querySelectorAll('#pokemonChoiceTabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===choiceTab));choiceList.innerHTML=choiceTab?(names.length?names.map(n=>'<button class="pill" data-pick="'+esc(n)+'">'+esc(n)+'<span class="muted">'+(state.pokemonTypes[n]||'')+'</span></button>').join(''):'<span class="small muted">まだ候補がありません</span>'):'';renderSuggest()}
    function renderSuggest(){let q=pokemonInput.value.trim();let names=allNames().filter(n=>matchesName(n,q)).slice(0,8);suggestions.innerHTML=names.map(n=>'<button class="pill" data-pick="'+esc(n)+'">'+esc(n)+'<span class="muted">'+(state.pokemonTypes[n]||'')+'</span></button>').join('')}
    function renderPokes(){let r=curResearch();pokemonList.innerHTML=r.pokemon.map((p,i)=>{let type=state.pokemonTypes[p.name]||p.sleepType||'うとうと';return '<div class="poke-row"><div><div class="between"><strong>'+esc(p.name)+'</strong><button class="pill" data-favorite="'+esc(p.name)+'">'+(state.favorites.includes(p.name)?'★':'☆')+'</button></div><div class="seg3">'+coreSleepTypes.map(t=>'<button data-poke-type="'+t+'" data-index="'+i+'" class="'+(type===t?'active':'')+'">'+t+'</button>').join('')+'</div></div><div class="controls"><button class="icon" data-dec="'+i+'">−</button><span class="count">'+p.count+'</span><button class="icon" data-inc="'+i+'">＋</button><button class="danger" data-del="'+i+'">削除</button></div></div>'}).join('')}
    function addPokemon(name){let clean=name.trim();if(!clean)return;let r=curResearch(),known=allNames().find(n=>kana(n)===kana(clean))||clean,p=r.pokemon.find(x=>x.name===known);if(p)p.count++;else r.pokemon.push({name:known,count:1,sleepType:state.pokemonTypes[known]||'うとうと'});if(!state.pokemonTypes[known])state.pokemonTypes[known]='うとうと';pokemonInput.value='';render()}
    function totalsFor(events){let res={first:0,second:0,total:0,types:Object.fromEntries(sleepTypes.map(t=>[t,0])),fields:{},kinds:{normal:0,special:0,legend:0},pokemon:{},byResearch:[{},{}],bySleep:Object.fromEntries(coreSleepTypes.map(t=>[t,{}]))};events.forEach(e=>{res.fields[e.island]??=0;e.days.forEach(d=>d.researches.forEach((r,idx)=>{let sum=r.pokemon.reduce((a,p)=>a+p.count,0);if(idx===0)res.first+=sum;else res.second+=sum;res.total+=sum;res.types[r.sleepType]=(res.types[r.sleepType]||0)+sum;res.fields[e.island]+=sum;res.kinds[e.kind]=(res.kinds[e.kind]||0)+sum;r.pokemon.forEach(p=>{let pt=state.pokemonTypes[p.name]||p.sleepType||'うとうと';res.byResearch[idx][p.name]=(res.byResearch[idx][p.name]||0)+p.count;if(coreSleepTypes.includes(pt))res.bySleep[pt][p.name]=(res.bySleep[pt][p.name]||0)+p.count;res.pokemon[p.name]??={total:0,types:{},islands:{},events:{},kinds:{normal:0,special:0,legend:0}};let x=res.pokemon[p.name];x.total+=p.count;x.types[pt]=(x.types[pt]||0)+p.count;x.islands[e.island]=(x.islands[e.island]||0)+p.count;x.events[e.name]=(x.events[e.name]||0)+p.count;x.kinds[e.kind]=(x.kinds[e.kind]||0)+p.count})}))});return res}
    function renderStats(){let e=curEvent();weeklyStats.innerHTML=e?weeklyHtml(totalsFor([e])):'イベント未設定';multiEventChoices.innerHTML=state.events.map(e=>'<label class="pill '+kindClass[e.kind]+'"><input type="checkbox" data-multi="'+e.id+'" '+(selectedMulti.has(e.id)?'checked':'')+'><span class="dot"></span>'+esc(e.name)+' / '+esc(e.island)+'</label>').join('');let m=state.events.filter(e=>selectedMulti.has(e.id));multiStats.innerHTML=m.length?statsHtml(totalsFor(m),false):'<p class="small muted">集計するイベントを選択してください。</p>';allStats.innerHTML=statsHtml(totalsFor(state.events),true)}
    function statsHtml(t,fields){let rows=sleepTypes.map(type=>chartRow(type,t.types[type]||0,t.total)).join('');let f=fields?'<h3>フィールド別</h3>'+Object.entries(t.fields).map(x=>chartRow(x[0],x[1],t.total)).join(''):'';let allPokes=Object.fromEntries(Object.entries(t.pokemon).map(x=>[x[0],x[1].total]));return '<div class="grid two"><div class="pill">1回目 <span class="count">'+t.first+'</span></div><div class="pill">2回目 <span class="count">'+t.second+'</span></div><div class="pill">全体 <span class="count">'+t.total+'</span></div></div><h3>出現ポケモン</h3>'+pokemonBreakdown(allPokes,t.total,10)+'<h3>睡眠タイプ別</h3>'+rows+f}
    function weeklyHtml(t){return '<div class="grid two"><div class="pill">1回目 <span class="count">'+t.first+'</span></div><div class="pill">2回目 <span class="count">'+t.second+'</span></div><div class="pill">全体 <span class="count">'+t.total+'</span></div></div><h3>1回目合計</h3>'+pokemonBreakdown(t.byResearch[0],t.first,7)+'<h3>2回目合計</h3>'+pokemonBreakdown(t.byResearch[1],t.second,7)+'<h3>全体合計</h3>'+pokemonBreakdown(Object.fromEntries(Object.entries(t.pokemon).map(x=>[x[0],x[1].total])),t.total,7)+'<h3>睡眠タイプ別合計</h3>'+coreSleepTypes.map(type=>{let typeTotal=Object.values(t.bySleep[type]).reduce((a,b)=>a+b,0);return '<div class="pill">'+type+' <span class="count">'+typeTotal+'</span></div>'+pokemonBreakdown(t.bySleep[type],typeTotal,7)}).join('')}
    function pokemonBreakdown(obj,total,limit){let entries=Object.entries(obj).filter(x=>x[1]).sort((a,b)=>b[1]-a[1]||a[0].localeCompare(b[0],'ja'));if(!entries.length)return '<p class="small muted">記録なし</p>';let top=entries.slice(0,limit),rest=entries.slice(limit);let html=top.map(x=>chartRow(x[0],x[1],total)).join('');if(rest.length){let restTotal=rest.reduce((a,x)=>a+x[1],0);html+='<details class="detail"><summary class="pill">残り '+rest.length+'種 / '+restTotal+'匹</summary>'+rest.map(x=>chartRow(x[0],x[1],total)).join('')+'</details>'}return html}
    function chartRow(label,value,total){let pct=total?Math.round(value/total*100):0;return '<div class="chart"><span class="small">'+esc(label)+'</span><div class="bar"><span style="width:'+pct+'%"></span></div><span class="small count">'+value+' / '+pct+'%</span></div>'}
    function pairs(obj){return Object.entries(obj).filter(x=>x[1]).sort((a,b)=>b[1]-a[1]).map(x=>x[0]+':'+x[1]).join('、')||'なし'}
    function renderDex(){let q=(dexSearch.value||'').trim(),totals=totalsFor(state.events).pokemon,names=Object.keys(totals).filter(n=>!q||matchesName(n,q)).sort((a,b)=>totals[b].total-totals[a].total);dexList.innerHTML=names.map(n=>{let p=totals[n],open=openDexName===n;return '<div class="card"><button class="between" style="width:100%;text-align:left" data-dex="'+esc(n)+'"><strong>'+esc(n)+'</strong><span class="pill">合計 '+p.total+'</span></button>'+(open?'<div class="detail"><h3>島別</h3>'+Object.entries(p.islands).map(x=>chartRow(x[0],x[1],p.total)).join('')+'<h3>イベント種類別</h3>'+Object.entries(kindLabels).map(x=>'<div class="'+kindClass[x[0]]+'">'+chartRow(x[1],p.kinds[x[0]]||0,p.total)+'</div>').join('')+'<h3>イベント別</h3><p class="small muted">'+pairs(p.events)+'</p></div>':'')+'</div>'}).join('')||'<div class="card small muted">まだ記録がありません。</div>'}
    function renderEvents(){eventList.innerHTML=state.events.map((e,i)=>'<div class="card '+kindClass[e.kind]+' '+(e.id===state.currentEventId?'current-event':'')+'"><div class="between"><div><div class="row"><span class="dot"></span><strong>'+esc(e.name)+'</strong>'+(e.id===state.currentEventId?'<span class="pill">現在</span>':'')+'</div><div class="small muted">'+e.date+' / '+esc(e.island)+' / '+kindLabels[e.kind]+'</div></div><div class="row"><button class="icon" data-up="'+i+'" '+(i===0?'disabled':'')+'>↑</button><button class="icon" data-down="'+i+'" '+(i===state.events.length-1?'disabled':'')+'>↓</button></div></div>'+(e.note?'<p class="small">'+esc(e.note)+'</p>':'')+'<div class="row wrap"><button data-current="'+e.id+'">現在に設定</button><button data-edit="'+e.id+'">編集</button><button class="danger" data-delete="'+e.id+'">削除</button></div></div>').join('')||'<div class="card small muted">イベントはまだありません。</div>'}
    function openDialog(e){dialogTitle.textContent=e?'イベント編集':'イベント作成';eventId.value=e?.id||'';eventName.value=e?.name||'';eventDate.value=e?.date||new Date().toISOString().slice(0,10);eventIsland.value=e?.island||islands[0];eventKind.value=e?.kind||'normal';eventNote.value=e?.note||'';eventDialog.showModal()}
    document.addEventListener('click',ev=>{let t=ev.target.closest('button,input');if(!t)return;if(t.dataset.screen){document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active',s.id==='screen-'+t.dataset.screen));document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active',b===t))}if(t.id==='themeToggle'){state.theme=state.theme==='dark'?'light':'dark';render()}if(t.id==='newEventBtn'||t.id==='newEventBtn2')openDialog();if(t.id==='closeEventDialog')eventDialog.close();if(t.dataset.day){activeDay=Number(t.dataset.day);activeResearch=0;render()}if(t.id==='research1'||t.id==='research2'){activeResearch=t.id==='research1'?0:1;render()}if(t.dataset.sleepType){curResearch().sleepType=t.dataset.sleepType;render()}if(t.id==='addPokemonBtn')addPokemon(pokemonInput.value);if(t.dataset.pick)addPokemon(t.dataset.pick);if(t.dataset.tab){choiceTab=choiceTab===t.dataset.tab?'':t.dataset.tab;renderChoices()}if(t.dataset.inc){curResearch().pokemon[Number(t.dataset.inc)].count++;render()}if(t.dataset.dec){let i=Number(t.dataset.dec),p=curResearch().pokemon[i];p.count=Math.max(0,p.count-1);if(p.count===0)curResearch().pokemon.splice(i,1);render()}if(t.dataset.del){curResearch().pokemon.splice(Number(t.dataset.del),1);render()}if(t.dataset.pokeType){let p=curResearch().pokemon[Number(t.dataset.index)];setPokemonType(p.name,t.dataset.pokeType);render()}if(t.dataset.favorite){let n=t.dataset.favorite;state.favorites=state.favorites.includes(n)?state.favorites.filter(x=>x!==n):[...state.favorites,n].sort((a,b)=>a.localeCompare(b,'ja'));render()}if(t.dataset.current){state.currentEventId=t.dataset.current;activeDay=0;activeResearch=0;render()}if(t.dataset.edit)openDialog(state.events.find(e=>e.id===t.dataset.edit));if(t.dataset.delete&&confirm('このイベントを削除しますか？')){state.events=state.events.filter(e=>e.id!==t.dataset.delete);if(state.currentEventId===t.dataset.delete)state.currentEventId=state.events[0]?.id||'';render()}if(t.dataset.up||t.dataset.down){let i=Number(t.dataset.up??t.dataset.down),j=t.dataset.up?i-1:i+1;[state.events[i],state.events[j]]=[state.events[j],state.events[i]];render()}if(t.id==='selectFieldBtn'){state.events.filter(e=>e.island===bulkFieldSelect.value).forEach(e=>selectedMulti.add(e.id));renderStats()}if(t.id==='selectKindBtn'){state.events.filter(e=>e.kind===bulkKindSelect.value).forEach(e=>selectedMulti.add(e.id));renderStats()}if(t.id==='clearMultiBtn'){selectedMulti.clear();renderStats()}if(t.dataset.dex){openDexName=openDexName===t.dataset.dex?'':t.dataset.dex;renderDex()}if(t.id==='exportBtn'){let blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='pokemon-sleep-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href)}if(t.id==='importBtn')importFile.click()});
    document.addEventListener('input',ev=>{let t=ev.target;if(t.id==='dayNote'){curEvent().days[activeDay].note=t.value;save()}if(t.id==='pokemonInput')renderSuggest();if(t.id==='dexSearch')renderDex();if(t.dataset.multi){t.checked?selectedMulti.add(t.dataset.multi):selectedMulti.delete(t.dataset.multi);renderStats()}});
    currentEventSelect.addEventListener('change',ev=>{state.currentEventId=ev.target.value;activeDay=0;activeResearch=0;render()});
    eventForm.addEventListener('submit',ev=>{ev.preventDefault();let id=eventId.value,v={name:eventName.value.trim(),date:eventDate.value,island:eventIsland.value,kind:eventKind.value,note:eventNote.value.trim()};if(!v.name||!v.date)return;if(id){let e=state.events.find(x=>x.id===id),start=mondayOf(v.date);Object.assign(e,v,{date:start});e.days.forEach((day,i)=>{let d=new Date(start+'T00:00:00');d.setDate(d.getDate()+i);day.date=d.toISOString().slice(0,10)})}else{let e=makeEvent(v);state.events.unshift(e);state.currentEventId=e.id}eventDialog.close();activeDay=0;activeResearch=0;render()});
    importFile.addEventListener('change',ev=>{let file=ev.target.files[0];if(!file)return;let reader=new FileReader();reader.onload=()=>{try{let data=JSON.parse(reader.result);if(!Array.isArray(data.events))throw Error();Object.assign(state,data);selectedMulti.clear();render();alert('バックアップを読み込みました。')}catch(e){alert('バックアップを読み込めませんでした。')}};reader.readAsText(file);ev.target.value=''});
    pokemonInput.addEventListener('keydown',ev=>{if(ev.key==='Enter')addPokemon(pokemonInput.value)});
    render();
  </script>
</body>
</html>
