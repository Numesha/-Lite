<body>
  <div class="app">
    <header><div class="top"><div><h1>ポケスリトラッカー</h1><div class="small muted" id="currentLabel">イベント未設定</div></div><button id="themeToggle" class="icon" title="ダークモード">◐</button></div></header>
    <main>
      <section id="screen-log" class="screen active">
        <div class="card grid"><div class="between"><h2>今週のイベント</h2><button class="primary" id="newEventBtn">＋作成</button></div><div class="row"><span id="currentKindDot" class="dot"></span><label style="flex:1">現在のイベント<select id="currentEventSelect"></select></label></div></div>
        <div id="noEvent" class="card"><p>まずイベントを作成してください。</p></div>
        <div id="logArea" class="hidden"><div class="card"><div class="days" id="dayStrip"></div><label>日ごとの備考<textarea id="dayNote" placeholder="料理、寝顔、気づいたことなど"></textarea></label></div><div class="card"><div class="research-tabs"><button id="research1" class="active">1回目リサーチ</button><button id="research2">2回目リサーチ</button></div><h3>睡眠タイプ</h3><div class="types" id="sleepTypeButtons"></div></div><div class="card"><h3>ポケモン入力</h3><div class="row"><input id="pokemonInput" placeholder="名前を入力" autocomplete="off"><button class="primary" id="addPokemonBtn">追加</button></div><div class="row wrap"><button id="screenshotBtn">スクショ読み込み</button><button id="pasteOcrBtn">読み取り文字を貼り付け</button><input id="screenshotFile" class="file" type="file" accept="image/*"></div><div class="small muted" id="ocrStatus"></div><div class="suggest" id="suggestions"></div><div class="seg3" id="pokemonChoiceTabs"><button data-tab="favorites" class="active">お気に入り</button><button data-tab="event">今回</button><button data-tab="all">全体</button></div><div class="choices" id="choiceList"></div><div id="pokemonList"></div></div></div>
      </section>
      <section id="screen-stats" class="screen"><div class="card"><h2>週間集計</h2><div id="weeklyStats"></div></div><div class="card"><h2>複数イベント集計</h2><div class="grid"><label>フィールド一括選択<select id="bulkFieldSelect"></select></label><div class="row"><button id="selectFieldBtn">フィールド選択</button><button id="clearMultiBtn">解除</button></div><label>イベント種類一括選択<select id="bulkKindSelect"><option value="normal">通常週</option><option value="special">イベント週</option><option value="legend">伝説イベント週</option></select></label><div class="row"><button id="selectKindBtn">種類選択</button></div><div id="multiEventChoices" class="grid"></div><div id="multiStats"></div></div></div><div class="card"><h2>全イベント合計</h2><div id="allStats"></div></div></section>
      <section id="screen-dex" class="screen"><div class="card"><h2>ポケモン図鑑</h2><input id="dexSearch" placeholder="ポケモン検索"></div><div id="dexList"></div></section>
      <section id="screen-events" class="screen"><div class="card between"><h2>過去イベント</h2><button class="primary" id="newEventBtn2">＋作成</button></div><div id="eventList"></div></section>
      <section id="screen-backup" class="screen"><div class="card grid"><h2>バックアップ</h2><button class="primary" id="exportBtn">バックアップを書き出し</button><button id="importBtn">バックアップを読み込み</button><input id="importFile" class="file" type="file" accept="application/json"><p class="small muted">端末内に自動保存されます。機種変更や予備保存にはバックアップを書き出してください。</p></div></section>
    </main>
    <nav class="tabs"><button data-screen="log" class="active">記録</button><button data-screen="stats">集計</button><button data-screen="dex">図鑑</button><button data-screen="events">一覧</button><button data-screen="backup">保存</button></nav>
  </div>
  <dialog id="eventDialog"><form class="card grid" id="eventForm"><h2 id="dialogTitle">イベント作成</h2><input type="hidden" id="eventId"><label>イベント名<input id="eventName" required></label><div class="grid two"><label>開始日<input id="eventDate" type="date" required></label><label>行く島<select id="eventIsland"></select></label></div><label>種類<select id="eventKind"><option value="normal">通常週</option><option value="special">イベント週</option><option value="legend">伝説イベント週</option></select></label><label>備考<textarea id="eventNote"></textarea></label><div class="row"><button class="primary" type="submit">保存</button><button type="button" id="closeEventDialog">閉じる</button></div></form></dialog>
  <dialog id="ocrDialog"><form class="card grid" id="ocrForm"><h2>スクショ読み取り結果</h2><p class="small muted">名前や睡眠タイプが違う場合は直してから追加してください。</p><div id="ocrRows" class="grid"></div><label>読み取り文字<textarea id="ocrRawText" placeholder="OCRがうまく動かない場合は、画像から読み取った文字をここに貼り付け"></textarea></label><div class="row wrap"><button type="button" id="parseOcrText">文字から候補作成</button><button type="button" class="primary" id="applyOcrRows">このリサーチに追加</button><button type="button" id="closeOcrDialog">閉じる</button></div></form></dialog>

    function openDialog(e){dialogTitle.textContent=e?'イベント編集':'イベント作成';eventId.value=e?.id||'';eventName.value=e?.name||'';eventDate.value=e?.date||new Date().toISOString().slice(0,10);eventIsland.value=e?.island||islands[0];eventKind.value=e?.kind||'normal';eventNote.value=e?.note||'';eventDialog.showModal()}
    document.addEventListener('click',ev=>{let t=ev.target.closest('button,input');if(!t)return;if(t.dataset.screen){document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active',s.id==='screen-'+t.dataset.screen));document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active',b===t))}if(t.id==='themeToggle'){state.theme=state.theme==='dark'?'light':'dark';render()}if(t.id==='newEventBtn'||t.id==='newEventBtn2')openDialog();if(t.id==='closeEventDialog')eventDialog.close();if(t.dataset.day){activeDay=Number(t.dataset.day);activeResearch=0;render()}if(t.id==='research1'||t.id==='research2'){activeResearch=t.id==='research1'?0:1;render()}if(t.dataset.sleepType){curResearch().sleepType=t.dataset.sleepType;render()}if(t.id==='addPokemonBtn')addPokemon(pokemonInput.value);if(t.id==='screenshotBtn')screenshotFile.click();if(t.id==='pasteOcrBtn'){ocrRawText.value='';renderOcrRows([]);ocrDialog.showModal()}if(t.id==='parseOcrText')renderOcrRows(parseResearchScreenshotText(ocrRawText.value));if(t.id==='applyOcrRows')applyOcrItems();if(t.id==='closeOcrDialog')ocrDialog.close();if(t.dataset.ocrDel){let items=syncOcrItems();items.splice(Number(t.dataset.ocrDel),1);renderOcrRows(items)}if(t.dataset.pick)addPokemon(t.dataset.pick);if(t.dataset.tab){choiceTab=choiceTab===t.dataset.tab?'':t.dataset.tab;renderChoices()}if(t.dataset.inc){curResearch().pokemon[Number(t.dataset.inc)].count++;render()}if(t.dataset.dec){let i=Number(t.dataset.dec),p=curResearch().pokemon[i];p.count=Math.max(0,p.count-1);if(p.count===0)curResearch().pokemon.splice(i,1);render()}if(t.dataset.del){curResearch().pokemon.splice(Number(t.dataset.del),1);render()}if(t.dataset.pokeType){let p=curResearch().pokemon[Number(t.dataset.index)];setPokemonType(p.name,t.dataset.pokeType);render()}if(t.dataset.favorite){let n=t.dataset.favorite;state.favorites=state.favorites.includes(n)?state.favorites.filter(x=>x!==n):[...state.favorites,n].sort((a,b)=>a.localeCompare(b,'ja'));render()}if(t.dataset.current){state.currentEventId=t.dataset.current;activeDay=0;activeResearch=0;render()}if(t.dataset.edit)openDialog(state.events.find(e=>e.id===t.dataset.edit));if(t.dataset.delete&&confirm('このイベントを削除しますか？')){state.events=state.events.filter(e=>e.id!==t.dataset.delete);if(state.currentEventId===t.dataset.delete)state.currentEventId=state.events[0]?.id||'';render()}if(t.dataset.up||t.dataset.down){let i=Number(t.dataset.up??t.dataset.down),j=t.dataset.up?i-1:i+1;[state.events[i],state.events[j]]=[state.events[j],state.events[i]];render()}if(t.id==='selectFieldBtn'){state.events.filter(e=>e.island===bulkFieldSelect.value).forEach(e=>selectedMulti.add(e.id));renderStats()}if(t.id==='selectKindBtn'){state.events.filter(e=>e.kind===bulkKindSelect.value).forEach(e=>selectedMulti.add(e.id));renderStats()}if(t.id==='clearMultiBtn'){selectedMulti.clear();renderStats()}if(t.dataset.dex){openDexName=openDexName===t.dataset.dex?'':t.dataset.dex;renderDex()}if(t.id==='exportBtn'){let blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='pokemon-sleep-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href)}if(t.id==='importBtn')importFile.click()});
    document.addEventListener('input',ev=>{let t=ev.target;if(t.id==='dayNote'){curEvent().days[activeDay].note=t.value;save()}if(t.id==='pokemonInput')renderSuggest();if(t.dataset.ocrName||t.dataset.ocrType)syncOcrItems();if(t.id==='dexSearch')renderDex();if(t.dataset.multi){t.checked?selectedMulti.add(t.dataset.multi):selectedMulti.delete(t.dataset.multi);renderStats()}});
    currentEventSelect.addEventListener('change',ev=>{state.currentEventId=ev.target.value;activeDay=0;activeResearch=0;render()});
    eventForm.addEventListener('submit',ev=>{ev.preventDefault();let id=eventId.value,v={name:eventName.value.trim(),date:eventDate.value,island:eventIsland.value,kind:eventKind.value,note:eventNote.value.trim()};if(!v.name||!v.date)return;if(id){let e=state.events.find(x=>x.id===id),start=mondayOf(v.date);Object.assign(e,v,{date:start});e.days.forEach((day,i)=>{day.date=addDays(start,i)})}else{let e=makeEvent(v);state.events.unshift(e);state.currentEventId=e.id}eventDialog.close();activeDay=0;activeResearch=0;render()});
    importFile.addEventListener('change',ev=>{let file=ev.target.files[0];if(!file)return;let reader=new FileReader();reader.onload=()=>{try{let data=JSON.parse(reader.result);if(!Array.isArray(data.events))throw Error();Object.assign(state,data);selectedMulti.clear();render();alert('バックアップを読み込みました。')}catch(e){alert('バックアップを読み込めませんでした。')}};reader.readAsText(file);ev.target.value=''});
    pokemonInput.addEventListener('keydown',ev=>{if(ev.key==='Enter')addPokemon(pokemonInput.value)});
    screenshotFile.addEventListener('change',ev=>{let file=ev.target.files[0];if(file)readScreenshot(file);ev.target.value=''});
    render();
  </script>
</body>
</html>
